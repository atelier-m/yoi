    <h1 class="section__title">
      特定商取引法に基づく表記

      <h2>事業者名</h2>
      <p>美宵</p>

      <p>※ここに名前</p>

      <p>※請求があった場合に開示</p>

      <p>出張着付けサービス</p>

      <h2>料金</h2>
      <p>各ページに記載の通り</p>

      <h2>支払方法</h2>
      <p>現金 / その他（必要に応じて記載）</p>

      <h2>キャンセルについて</h2>
      <p>
        キャンセルについては、事前にご相談ください。<br>
        日程によりキャンセル料が発生する場合がございます。

    </div>
