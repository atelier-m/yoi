<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>料金詳細｜美宵 - YOI -</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<header class="site-header">
  <div class="header__inner">
    <a href="index.html" class="header__logo">
      <img src="images/logo.png" alt="美宵 - YOI -" class="header__logo-img">
      <div class="header__logo-text">
        <span class="header__name">美宵 <small>- YOI -</small></span>
        <span class="header__sub">京都の出張着付け</span>
      </div>
    </a>
  </div>
</header>

<main>

<section class="section">
  <div class="container">

    <p class="section__label">Price</p>
    <h1 class="section__title">料金詳細について</h1>

    <p class="section__text">
      着物の種類やご利用時間帯により、料金が異なります。<br>
      下記をご参考に、ご不明点はお気軽にご相談ください。
    </p>

  </div>
</section>

<!-- 基本料金 -->
<section class="section section--alt">
  <div class="container">

    <h2 class="section__title">基本料金</h2>

    <div class="price-detail__list">
      <div class="price-detail__item">
        <span>訪問着・色無地</span>
        <span>¥7,000〜</span>
      </div>
      <div class="price-detail__item">
        <span>振袖</span>
        <span>¥10,000〜</span>
      </div>
      <div class="price-detail__item">
        <span>七五三</span>
        <span>¥6,000〜</span>
      </div>
      <div class="price-detail__item">
        <span>浴衣</span>
        <span>¥5,000〜</span>
      </div>
    </div>

  </div>
</section>

<!-- 追加料金 -->
<section class="section">
  <div class="container">

    <h2 class="section__title">追加料金について</h2>

    <ul class="price-detail__note">
      <li>早朝料金（6:00〜8:00）：＋¥1,000</li>
      <li>出張費：＋¥1,000</li>
      <li>駐車場代が必要な場合：実費</li>
    </ul>

  </div>
</section>

<!-- CTA -->
<section class="section section--alt">
  <div class="container">

    <h2 class="section__title">ご予約・ご相談</h2>

    <p class="section__text">
      ご希望に合わせて最適なご提案をさせていただきます。<br>
      お気軽にご相談ください。
    </p>

    <div class="btn-wrap">
      <a href="#" class="btn btn--primary">LINEでご予約・ご相談</a>
    </div>

  </div>
</section>

</main>

<footer class="footer">
  <div class="container">
    <p class="footer__copy">© 美宵 - YOI -</p>
  </div>
</footer>

</body>
</html>
